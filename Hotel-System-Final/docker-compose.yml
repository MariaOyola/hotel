name: hotel_system_db

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotel_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5446}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hotel_system}"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    build:
      context: .
      dockerfile: docker/liquibase/DockerFile
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    entrypoint: ["liquibase"]  
   
    command: >
      --changeLogFile=changelog/db.changelog-master.yaml 
      --url=jdbc:postgresql://postgres:5432/hotel_system
      --username=postgres
      --password=postgres
      update

volumes:
  postgres_data:
